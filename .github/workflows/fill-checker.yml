name: Fill Checker (ETH + SOL)

on:
  workflow_dispatch: {}   # triggered by the external cron scheduler (no in-workflow schedule)

permissions:
  contents: write   # needed so the workflow can commit state files back

jobs:
  check-fill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: ETH fill check
        run: python fill_checker.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OKX_PROXY: ${{ secrets.OKX_PROXY }}   # proxy OKX calls past the runner's geo-block
      - name: SOL fill check
        if: always()   # a transient ETH failure shouldn't stop the SOL check
        run: python fill_checker.py
        env:
          INST_ID: SOL-USDT-SWAP
          STATE_FILE: state_sol.json
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OKX_PROXY: ${{ secrets.OKX_PROXY }}
      - name: BTC fill check
        if: always()   # a transient ETH/SOL failure shouldn't stop the BTC check
        run: python fill_checker.py
        env:
          INST_ID: BTC-USDT-SWAP
          STATE_FILE: state_btc.json
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_NAME: BTC Hourly Report
          OKX_PROXY: ${{ secrets.OKX_PROXY }}
          # Keep BTC's tighter 1.0x-ATR stop consistent with the report step, so any
          # plan the fill-time re-validation rebuilds uses the same stop basis. See
          # eth-report.yml's BTC step for the in-/out-of-sample validation.
          ATR_SL_MULT: "1.0"
          # Keep BTC's deeper 0.9x-ATR pullback entry consistent with the report step, for
          # the same reason (the re-validation may rebuild the entry level). See
          # eth-report.yml's BTC step for the in-/out-of-sample validation.
          PULLBACK_ATR_MULT: "0.9"
      - name: ETH price-action fill check
        if: always()   # watch the price-action strategy's pending entries too
        run: python fill_checker.py
        env:
          STRATEGY: price_action
          STATE_FILE: state_pa.json
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_NAME: ETH Price-Action
          OKX_PROXY: ${{ secrets.OKX_PROXY }}
      - name: SOL price-action fill check
        if: always()
        run: python fill_checker.py
        env:
          STRATEGY: price_action
          INST_ID: SOL-USDT-SWAP
          STATE_FILE: state_pa_sol.json
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_NAME: SOL Price-Action
          OKX_PROXY: ${{ secrets.OKX_PROXY }}
      - name: Save signal state
        if: always()
        run: |
          git config user.name "eth-report-bot"
          git config user.email "actions@github.com"
          git add state*.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update fill-check state [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main -X ours && git push origin main; then
              echo "Pushed successfully."
              exit 0
            fi
            echo "Push attempt $i failed (likely a race with another workflow run) — retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 5 + 2))
          done
          echo "Failed to push after retries."
          exit 1
