name: ETH Fill Checker

on:
  workflow_dispatch: {}   # triggered externally every 15 min by cron-job.org

permissions:
  contents: write   # needed so the workflow can commit state.json back

jobs:
  check-fill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python fill_checker.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      - name: Save signal state
        run: |
          git config user.name "eth-report-bot"
          git config user.email "actions@github.com"
          git add state.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update fill-check state [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main -X ours && git push origin main; then
              echo "Pushed successfully."
              exit 0
            fi
            echo "Push attempt $i failed (likely a race with another workflow run) — retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 5 + 2))
          done
          echo "Failed to push after retries."
          exit 1
