name: Run Parameter Sweep

on:
  workflow_dispatch:
    inputs:
      inst:
        description: "Instrument to test (e.g. ETH-USDT-SWAP, BTC-USDT-SWAP)"
        required: false
        default: "ETH-USDT-SWAP"
      months:
        description: "How many months of history to test"
        required: false
        default: "12"
      bar:
        description: "Candle timeframe (1H, 15m, 4H)"
        required: false
        default: "1H"
      end_date:
        description: "Optional: end date for the window, e.g. 2024-06-01 (leave blank for most recent data)"
        required: false
        default: ""
      param:
        description: "Which strategy threshold to sweep (PULLBACK_ATR_MULT, MIN_RR, ADX_MIN, ATR_SL_MULT, LONG_SCORE_MIN, SHORT_SCORE_MAX)"
        required: false
        default: "PULLBACK_ATR_MULT"
      values:
        description: "Comma-separated values to test for that param"
        required: false
        default: "1.0,0.7,0.5,0.3"
      adx_min:
        description: "Minimum ADX to allow a trade (should match your live bot's ADX_MIN unless you're deliberately testing a different value)"
        required: false
        default: "20"
      skip_sessions:
        description: "Comma-separated sessions to sit out (asia,europe,us). Match live: blank for ETH/SOL, 'asia' for BTC."
        required: false
        default: ""

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run parameter sweep
        run: |
          ARGS="--inst ${{ github.event.inputs.inst }} --months ${{ github.event.inputs.months }} --bar ${{ github.event.inputs.bar }} --param ${{ github.event.inputs.param }} --values ${{ github.event.inputs.values }}"
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            ARGS="$ARGS --end-date ${{ github.event.inputs.end_date }}"
          fi
          python -u backtest_sweep.py $ARGS
        env:
          ADX_MIN: ${{ github.event.inputs.adx_min }}
          SKIP_SESSIONS: ${{ github.event.inputs.skip_sessions }}   # sit out these sessions (match live: 'asia' for BTC)
          OKX_PROXY: ${{ secrets.OKX_PROXY }}   # proxy OKX calls past the runner's geo-block
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: sweep-results
          path: "*_sweep.csv"
