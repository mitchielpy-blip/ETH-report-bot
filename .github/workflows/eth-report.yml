name: ETH Hourly Report

on:
  schedule:
    - cron: "7 * * * *"   # every hour at :07 — avoids GitHub's top-of-hour congestion
  workflow_dispatch: {}     # lets you also trigger it manually from GitHub

permissions:
  contents: write   # needed so the workflow can commit state.json back

jobs:
  post-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python eth_report_bot.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      - name: Save signal state and log
        run: |
          git config user.name "eth-report-bot"
          git config user.email "actions@github.com"
          git add state.json signals_log.csv
          git diff --staged --quiet || git commit -m "Update signal state and log [skip ci]"
          git push
