name: Hourly Report (ETH + SOL)

on:
  workflow_dispatch: {}     # triggered by the external cron scheduler (no in-workflow schedule)

permissions:
  contents: write   # needed so the workflow can commit state/log files back

jobs:
  post-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: ETH report
        run: python eth_report_bot.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OKX_PROXY: ${{ secrets.OKX_PROXY }}   # proxy OKX calls past the runner's geo-block
      - name: SOL report
        if: always()   # a transient ETH failure shouldn't silence the SOL report
        run: python eth_report_bot.py
        env:
          INST_ID: SOL-USDT-SWAP
          STATE_FILE: state_sol.json
          SIGNALS_LOG_FILE: signals_log_sol.csv
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OKX_PROXY: ${{ secrets.OKX_PROXY }}
      - name: BTC report
        if: always()   # a transient ETH/SOL failure shouldn't silence the BTC report
        run: python eth_report_bot.py
        env:
          INST_ID: BTC-USDT-SWAP
          STATE_FILE: state_btc.json
          SIGNALS_LOG_FILE: signals_log_btc.csv
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}   # same channel as ETH/SOL
          DISCORD_BOT_NAME: BTC Hourly Report
          OKX_PROXY: ${{ secrets.OKX_PROXY }}
          # Sit out the Asia session (00-08 UTC) for BTC only. Validated out-of-sample:
          # BTC's Asia session lost across two independent 12-month diagnostics windows,
          # and the full walk-forward backtest confirms skipping it lifts BTC expectancy
          # +0.14R->+0.19R, win rate 47.9%->49.6%, drawdown 8.0%->6.4%, and turns the weak
          # first half positive. ETH/SOL are left on all sessions (the filter is neutral-
          # to-harmful for them), so this stays a per-instrument setting.
          SKIP_SESSIONS: asia
          # Tighter stop for BTC only (1.0x ATR vs the 1.5x default). Validated
          # in-sample AND out-of-sample (window ending 2025-07-12): 1.0 lifts BTC
          # net expectancy ~+0.20R->+0.29R/trade and is the only BTC stop width with
          # both OOS half-splits positive. ETH/SOL are genuinely best at 1.5 (ETH's
          # 1.0 edge did not replicate OOS; SOL peaks at 1.5), so this is per-instrument.
          # Parity-safe: ATR_SL_MULT sizes the stop at signal time (part of the plan the
          # alert posts), so live and backtest still derive the same behaviour.
          ATR_SL_MULT: "1.0"
          # Deeper pullback entry for BTC only (0.9x ATR vs the 0.7x default). Validated
          # in-sample AND out-of-sample (window ending 2025-07-12): 0.9 lifts BTC net
          # expectancy +0.25R->+0.29R/trade OOS and ties it in-sample (+0.32R->+0.33R),
          # at a similar trade count, with both OOS half-splits positive. The funding-
          # coverage gap flatters shallower (higher-volume) settings, so 0.9's edge is if
          # anything understated. ETH/SOL are best at 0.7 (ETH unstable OOS; SOL's 0.7 is
          # robust while 0.9 collapses in-sample), so this stays per-instrument. Parity-
          # safe: PULLBACK_ATR_MULT places the entry at signal time (part of the posted
          # plan), so live and backtest still derive the same behaviour.
          PULLBACK_ATR_MULT: "0.9"
      - name: Save signal state and log
        if: always()
        run: |
          git config user.name "eth-report-bot"
          git config user.email "actions@github.com"
          git add state*.json signals_log*.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update signal state and log [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main -X ours && git push origin main; then
              echo "Pushed successfully."
              exit 0
            fi
            echo "Push attempt $i failed (likely a race with another workflow run) — retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 5 + 2))
          done
          echo "Failed to push after retries."
          exit 1
