name: Forward-Test Report

on:
  workflow_dispatch: {}

jobs:
  forward-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python forward_test_report.py
