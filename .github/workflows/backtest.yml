name: Run Backtest

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: "Strategy to backtest (indicator or price_action)"
        required: false
        default: "indicator"
        type: choice
        options:
          - indicator
          - price_action
      inst:
        description: "Instrument to test (e.g. ETH-USDT-SWAP, BTC-USDT-SWAP)"
        required: false
        default: "ETH-USDT-SWAP"
      months:
        description: "How many months of history to test"
        required: false
        default: "6"
      bar:
        description: "Candle timeframe for the indicator strategy (1H, 15m, 4H). Ignored for price_action, which is always driven from a 5m feed."
        required: false
        default: "1H"
      end_date:
        description: "Optional: end date for the window, e.g. 2024-06-01 (leave blank for most recent data)"
        required: false
        default: ""
      adx_min:
        description: "Minimum ADX to allow a trade (higher = stricter trend-strength filter)"
        required: false
        default: "20"
      skip_sessions:
        description: "Comma-separated sessions to sit out (asia,europe,us). Blank = trade all (default)."
        required: false
        default: ""

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run backtest
        run: |
          ARGS="--inst ${{ github.event.inputs.inst }} --months ${{ github.event.inputs.months }} --bar ${{ github.event.inputs.bar }}"
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            ARGS="$ARGS --end-date ${{ github.event.inputs.end_date }}"
          fi
          python -u backtest.py $ARGS
        env:
          STRATEGY: ${{ github.event.inputs.strategy }}
          ADX_MIN: ${{ github.event.inputs.adx_min }}   # indicator strategy only
          SKIP_SESSIONS: ${{ github.event.inputs.skip_sessions }}   # sit out these sessions (indicator strategy)
          OKX_PROXY: ${{ secrets.OKX_PROXY }}   # proxy OKX calls past the runner's geo-block
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            trades.csv
            equity_curve.png
