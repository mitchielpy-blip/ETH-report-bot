name: Run Backtest

on:
  workflow_dispatch:
    inputs:
      months:
        description: "How many months of history to test"
        required: false
        default: "6"
      bar:
        description: "Candle timeframe (1H, 15m, 4H)"
        required: false
        default: "1H"

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python backtest.py --months "${{ github.event.inputs.months }}" --bar "${{ github.event.inputs.bar }}"
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            trades.csv
            equity_curve.png
