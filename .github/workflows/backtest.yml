name: Run Backtest

on:
  workflow_dispatch:
    inputs:
      months:
        description: "How many months of history to test"
        required: false
        default: "6"
      bar:
        description: "Candle timeframe (1H, 15m, 4H)"
        required: false
        default: "1H"
      end_date:
        description: "Optional: end date for the window, e.g. 2024-06-01 (leave blank for most recent data)"
        required: false
        default: ""

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run backtest
        run: |
          ARGS="--months ${{ github.event.inputs.months }} --bar ${{ github.event.inputs.bar }}"
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            ARGS="$ARGS --end-date ${{ github.event.inputs.end_date }}"
          fi
          python backtest.py $ARGS
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            trades.csv
            equity_curve.png
