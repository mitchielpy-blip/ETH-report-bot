name: Run Backtest

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: "Strategy to backtest (indicator or price_action)"
        required: false
        default: "indicator"
        type: choice
        options:
          - indicator
          - price_action
      inst:
        description: "Instrument to test (e.g. ETH-USDT-SWAP, BTC-USDT-SWAP)"
        required: false
        default: "ETH-USDT-SWAP"
      months:
        description: "How many months of history to test"
        required: false
        default: "6"
      bar:
        description: "Candle timeframe for the indicator strategy (1H, 15m, 4H). Ignored for price_action, which is always driven from a 5m feed."
        required: false
        default: "1H"
      end_date:
        description: "Optional: end date for the window, e.g. 2024-06-01 (leave blank for most recent data)"
        required: false
        default: ""
      adx_min:
        description: "Minimum ADX to allow a trade (higher = stricter trend-strength filter)"
        required: false
        default: "20"
      skip_sessions:
        description: "Comma-separated sessions to sit out (asia,europe,us). Blank = trade all (default)."
        required: false
        default: ""
      exit_model:
        description: "Exit management (indicator/price_action). fixed = set-and-forget (live default); breakeven = move stop to entry after +BREAKEVEN_AT_R; trailing = trail the stop behind the best price. Backtest-research only — do NOT set this on the live report/fill-checker workflows (there is no live position-manager yet)."
        required: false
        default: "fixed"
        type: choice
        options:
          - fixed
          - breakeven
          - trailing
      breakeven_at_r:
        description: "Favourable R reached before the stop moves to breakeven (only used when exit_model=breakeven)."
        required: false
        default: "1.0"
      trail_at_r:
        description: "Favourable R before the trailing stop activates (only used when exit_model=trailing)."
        required: false
        default: "1.0"
      trail_distance_r:
        description: "How far (in R) the stop trails behind the best price (only used when exit_model=trailing)."
        required: false
        default: "1.0"
      trail_honor_target:
        description: "true = keep the fixed target as a hard cap; false (default) = let a trailing trade run past it (only used when exit_model=trailing)."
        required: false
        default: "false"
      invert_signal:
        description: "FADE the bias score: take the opposite side of every signal the strategy would trade (same bars, flipped direction). Backtest-research only — do NOT set on the live report/fill-checker workflows."
        required: false
        default: "false"
      atr_sl_mult:
        description: "Stop distance in ATRs (stop = ATR * this). Lower = tighter stop, higher win rate but the R:R gate rejects more setups; higher = wider stop, fewer stop-outs but each loss is bigger. Live default 1.5. Sweep knob — change the live default only after it wins in both windows."
        required: false
        default: "1.5"
      pullback_atr_mult:
        description: "How deep a pullback entry to seek, in ATRs (entry = price -/+ ATR * this). Live default 0.7. Sweep knob — change the live default only after it wins in both windows."
        required: false
        default: "0.7"
      entry_wait_hours:
        description: "How many bars a pending pullback order stays live before it expires unfilled. Live default 8. Higher = recover slow pullbacks (more fills) at the cost of acting on a staler signal."
        required: false
        default: "8"

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run backtest
        run: |
          ARGS="--inst ${{ github.event.inputs.inst }} --months ${{ github.event.inputs.months }} --bar ${{ github.event.inputs.bar }}"
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            ARGS="$ARGS --end-date ${{ github.event.inputs.end_date }}"
          fi
          python -u backtest.py $ARGS
        env:
          STRATEGY: ${{ github.event.inputs.strategy }}
          ADX_MIN: ${{ github.event.inputs.adx_min }}   # indicator strategy only
          SKIP_SESSIONS: ${{ github.event.inputs.skip_sessions }}   # sit out these sessions (indicator strategy)
          EXIT_MODEL: ${{ github.event.inputs.exit_model }}   # fixed | breakeven | trailing — research knob, NOT wired to any live workflow
          BREAKEVEN_AT_R: ${{ github.event.inputs.breakeven_at_r }}   # favourable R before the stop moves to entry
          TRAIL_AT_R: ${{ github.event.inputs.trail_at_r }}   # favourable R before the trailing stop activates
          TRAIL_DISTANCE_R: ${{ github.event.inputs.trail_distance_r }}   # how far (in R) the stop trails behind the best price
          TRAIL_HONOR_TARGET: ${{ github.event.inputs.trail_honor_target }}   # true = keep target as a cap; false = ride past it
          INVERT_SIGNAL: ${{ github.event.inputs.invert_signal }}   # fade the score — research knob, NOT wired to any live workflow
          ATR_SL_MULT: ${{ github.event.inputs.atr_sl_mult }}   # stop distance in ATRs (live default 1.5)
          PULLBACK_ATR_MULT: ${{ github.event.inputs.pullback_atr_mult }}   # pullback entry depth in ATRs (live default 0.7)
          ENTRY_WAIT_HOURS: ${{ github.event.inputs.entry_wait_hours }}   # bars a pending order stays live (live default 8)
          OKX_PROXY: ${{ secrets.OKX_PROXY }}   # proxy OKX calls past the runner's geo-block
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            trades.csv
            equity_curve.png
